<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AuthApp</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0b0c10;
      --surface:   #13141a;
      --border:    #1f2130;
      --accent:    #00e5a0;
      --accent2:   #7c5cfc;
      --text:      #e8eaf0;
      --muted:     #5a5f7a;
      --error:     #ff4e6a;
      --success:   #00e5a0;
      --radius:    14px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* ---- animated grid background ---- */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,229,160,.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,229,160,.04) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }
    body::after {
      content: '';
      position: fixed;
      width: 520px; height: 520px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(124,92,252,.18) 0%, transparent 70%);
      top: -140px; right: -140px;
      pointer-events: none;
      z-index: 0;
    }

    .glow-blob {
      position: fixed;
      width: 400px; height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(0,229,160,.12) 0%, transparent 70%);
      bottom: -120px; left: -100px;
      pointer-events: none;
      z-index: 0;
    }

    /* ---- card ---- */
    .card {
      position: relative;
      z-index: 1;
      width: 420px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 40px 36px 36px;
      box-shadow: 0 0 0 1px rgba(0,229,160,.06), 0 40px 80px rgba(0,0,0,.5);
      animation: rise .55s cubic-bezier(.22,1,.36,1) both;
    }
    @keyframes rise {
      from { opacity:0; transform: translateY(28px) scale(.97); }
      to   { opacity:1; transform: translateY(0)    scale(1);   }
    }

    /* ---- logo ---- */
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 28px;
    }
    .logo-icon {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      box-shadow: 0 0 20px rgba(0,229,160,.3);
    }
    .logo-text {
      font-size: 1.25rem;
      font-weight: 800;
      letter-spacing: -.02em;
    }
    .logo-text span { color: var(--accent); }

    /* ---- tabs ---- */
    .tabs {
      display: flex;
      background: var(--bg);
      border-radius: 10px;
      padding: 4px;
      margin-bottom: 28px;
      gap: 4px;
    }
    .tab-btn {
      flex: 1;
      padding: 9px 0;
      border: none;
      border-radius: 8px;
      background: transparent;
      color: var(--muted);
      font-family: 'Syne', sans-serif;
      font-size: .9rem;
      font-weight: 600;
      cursor: pointer;
      transition: all .25s;
      letter-spacing: .02em;
    }
    .tab-btn.active {
      background: var(--surface);
      color: var(--text);
      box-shadow: 0 1px 8px rgba(0,0,0,.4);
    }

    /* ---- form panels ---- */
    .panel { display: none; }
    .panel.active { display: block; animation: fadein .3s ease both; }
    @keyframes fadein { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }

    /* ---- form elements ---- */
    .field {
      margin-bottom: 16px;
    }
    label {
      display: block;
      font-size: .75rem;
      font-weight: 600;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 7px;
      font-family: 'DM Mono', monospace;
    }
    input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: .95rem;
      padding: 12px 16px;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    input::placeholder { color: var(--muted); }
    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(0,229,160,.12);
    }

    /* ---- button ---- */
    .btn {
      width: 100%;
      margin-top: 8px;
      padding: 14px;
      border: none;
      border-radius: var(--radius);
      background: linear-gradient(135deg, var(--accent), #00c98a);
      color: #0b0c10;
      font-family: 'Syne', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: .03em;
      cursor: pointer;
      transition: transform .15s, box-shadow .15s, opacity .15s;
      box-shadow: 0 4px 20px rgba(0,229,160,.3);
    }
    .btn:hover  { transform: translateY(-1px); box-shadow: 0 6px 28px rgba(0,229,160,.45); }
    .btn:active { transform: translateY(0);    opacity: .9; }
    .btn:disabled { opacity: .5; cursor: not-allowed; transform: none; }

    /* ---- toast ---- */
    .toast {
      display: none;
      margin-top: 18px;
      padding: 13px 16px;
      border-radius: 10px;
      font-size: .88rem;
      font-weight: 600;
      font-family: 'DM Mono', monospace;
      animation: fadein .3s ease;
    }
    .toast.error   { background: rgba(255,78,106,.12); border: 1px solid rgba(255,78,106,.3);  color: var(--error);   }
    .toast.success { background: rgba(0,229,160,.1);   border: 1px solid rgba(0,229,160,.3);   color: var(--success); }
    .toast.show    { display: block; }

    /* ---- welcome screen ---- */
    #welcome {
      display: none;
      text-align: center;
      animation: rise .5s cubic-bezier(.22,1,.36,1) both;
    }
    .welcome-icon {
      width: 72px; height: 72px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 32px;
      margin: 0 auto 22px;
      box-shadow: 0 0 40px rgba(0,229,160,.4);
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { box-shadow: 0 0 30px rgba(0,229,160,.3); }
      50%      { box-shadow: 0 0 60px rgba(0,229,160,.6); }
    }
    .welcome-title {
      font-size: 1.7rem;
      font-weight: 800;
      letter-spacing: -.03em;
      margin-bottom: 8px;
    }
    .welcome-name { color: var(--accent); }
    .welcome-sub {
      font-size: .9rem;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      margin-bottom: 8px;
    }
    .badge {
      display: inline-block;
      background: rgba(0,229,160,.1);
      border: 1px solid rgba(0,229,160,.25);
      color: var(--accent);
      border-radius: 100px;
      font-size: .78rem;
      font-family: 'DM Mono', monospace;
      padding: 5px 14px;
      margin-bottom: 24px;
      letter-spacing: .06em;
    }
    .btn-logout {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: 'Syne', sans-serif;
      font-size: .85rem;
      padding: 9px 22px;
      border-radius: 10px;
      cursor: pointer;
      transition: all .2s;
    }
    .btn-logout:hover { border-color: var(--error); color: var(--error); }
  </style>
</head>
<body>
<div class="glow-blob"></div>

<div class="card">

  <!-- Auth Forms -->
  <div id="auth-section">
    <div class="logo">
      <div class="logo-icon">⚡</div>
      <div class="logo-text">Auth<span>App</span></div>
    </div>

    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('signin')">Sign In</button>
      <button class="tab-btn"        onclick="switchTab('signup')">Sign Up</button>
    </div>

    <!-- Sign In -->
    <div id="panel-signin" class="panel active">
      <div class="field">
        <label>Username</label>
        <input type="text" id="si-username" placeholder="your_username" autocomplete="username"/>
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="si-password" placeholder="••••••••" autocomplete="current-password"/>
      </div>
      <button class="btn" onclick="handleSignIn()">Sign In →</button>
      <div class="toast" id="si-toast"></div>
    </div>

    <!-- Sign Up -->
    <div id="panel-signup" class="panel">
      <div class="field">
        <label>Full Name</label>
        <input type="text" id="su-name" placeholder="Vikas Kumar" autocomplete="name"/>
      </div>
      <div class="field">
        <label>Username</label>
        <input type="text" id="su-username" placeholder="vikas_k" autocomplete="username"/>
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="su-password" placeholder="••••••••" autocomplete="new-password"/>
      </div>
      <button class="btn" onclick="handleSignUp()">Create Account →</button>
      <div class="toast" id="su-toast"></div>
    </div>
  </div>

  <!-- Welcome Screen -->
  <div id="welcome">
    <div class="welcome-icon">✓</div>
    <div class="welcome-title">Hello, <span class="welcome-name" id="welcome-name"></span>!</div>
    <div class="welcome-sub">You are authorised</div>
    <div class="badge">✦ ACCESS GRANTED</div>
    <br/>
    <button class="btn-logout" onclick="handleLogout()">Sign Out</button>
  </div>

</div>

<script>
  const API = ''; // same origin

  function switchTab(tab) {
    document.querySelectorAll('.tab-btn').forEach((b,i) =>
      b.classList.toggle('active', (tab==='signin'?0:1)===i));
    document.getElementById('panel-signin').classList.toggle('active', tab==='signin');
    document.getElementById('panel-signup').classList.toggle('active', tab==='signup');
    clearToasts();
  }

  function showToast(id, msg, type) {
    const el = document.getElementById(id);
    el.textContent = (type==='error'?'✕ ':'✓ ') + msg;
    el.className = `toast ${type} show`;
  }

  function clearToasts() {
    document.querySelectorAll('.toast').forEach(t => t.classList.remove('show'));
  }

  async function handleSignIn() {
    const username = document.getElementById('si-username').value.trim();
    const password = document.getElementById('si-password').value;
    if (!username || !password) return showToast('si-toast','Fill all fields.','error');

    const btn = document.querySelector('#panel-signin .btn');
    btn.disabled = true; btn.textContent = 'Signing in…';

    try {
      const res  = await fetch('/api/signin', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({username, password})
      });
      const data = await res.json();
      if (data.success) {
        showWelcome(data.name);
      } else {
        showToast('si-toast', data.message, 'error');
      }
    } catch { showToast('si-toast','Could not reach server.','error'); }

    btn.disabled = false; btn.textContent = 'Sign In →';
  }

  async function handleSignUp() {
    const name     = document.getElementById('su-name').value.trim();
    const username = document.getElementById('su-username').value.trim();
    const password = document.getElementById('su-password').value;
    if (!name||!username||!password) return showToast('su-toast','Fill all fields.','error');
    if (password.length < 4) return showToast('su-toast','Password too short.','error');

    const btn = document.querySelector('#panel-signup .btn');
    btn.disabled = true; btn.textContent = 'Creating…';

    try {
      const res  = await fetch('/api/signup', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({name, username, password})
      });
      const data = await res.json();
      if (data.success) {
        showToast('su-toast', data.message, 'success');
        setTimeout(() => switchTab('signin'), 1800);
      } else {
        showToast('su-toast', data.message, 'error');
      }
    } catch { showToast('su-toast','Could not reach server.','error'); }

    btn.disabled = false; btn.textContent = 'Create Account →';
  }

  function showWelcome(name) {
    document.getElementById('welcome-name').textContent = name;
    document.getElementById('auth-section').style.display = 'none';
    document.getElementById('welcome').style.display = 'block';
  }

  function handleLogout() {
    document.getElementById('auth-section').style.display = 'block';
    document.getElementById('welcome').style.display = 'none';
    document.getElementById('si-username').value = '';
    document.getElementById('si-password').value = '';
    clearToasts();
    switchTab('signin');
  }

  // Enter key support
  document.addEventListener('keydown', e => {
    if (e.key !== 'Enter') return;
    if (document.getElementById('panel-signin').classList.contains('active')) handleSignIn();
    else handleSignUp();
  });
</script>
</body>
</html>
